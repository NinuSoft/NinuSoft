<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>NinuSoft — Enterprise Software Engineering From Nineveh, Iraq</title>
  <meta name="description"
    content="NinuSoft engineers custom software, enterprise systems, web and mobile applications, and AI automation that helps businesses, banks, and public institutions cut costs and scale with confidence. Based in Mosul (Nineveh), Iraq." />
  <meta name="keywords"
    content="NinuSoft, software development company Iraq, custom software Mosul, enterprise software, web application development, mobile app development, AI automation, cloud solutions, Nineveh, Iraq tech company" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://ninusoft.com/" />
  <meta property="og:title" content="NinuSoft — Enterprise Software Engineering From Nineveh, Iraq" />
  <meta property="og:description"
    content="Custom software, enterprise systems, web and mobile applications, and AI automation engineered to cut costs and scale with confidence." />
  <meta property="og:image" content="/opengraph.webp" />
  <meta property="og:url" content="https://ninusoft.com" />
  <meta property="og:site_name" content="NinuSoft" />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="en_US" />
  <meta property="og:locale:alternate" content="ar_IQ" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="NinuSoft — Enterprise Software Engineering From Nineveh, Iraq" />
  <meta name="twitter:description"
    content="Custom software, enterprise systems, web and mobile applications, and AI automation engineered to cut costs and scale with confidence." />
  <meta name="twitter:image" content="/opengraph.webp" />
  <link rel="icon" type="image/png" href="/logo.png" />

  <!-- Structured Data: Organization + Founder -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "NinuSoft",
    "url": "https://ninusoft.com",
    "logo": "https://ninusoft.com/logo.png",
    "description": "NinuSoft engineers custom software, enterprise systems, web and mobile applications, and AI automation for businesses, financial institutions, and public organizations.",
    "address": {
      "@type": "PostalAddress",
      "addressLocality": "Mosul",
      "addressRegion": "Nineveh",
      "addressCountry": "IQ"
    },
    "email": "info@ninusoft.com",
    "founder": {
      "@type": "Person",
      "name": "Ahmed Mones",
      "jobTitle": "Founder & Lead Software Engineer",
      "sameAs": [
        "https://linkedin.com/in/ahmedmones",
        "https://github.com/Al-Taie"
      ]
    },
    "sameAs": [
      "https://linkedin.com/company/ninusoft",
      "https://github.com/ninusoft"
    ]
  }
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Preload Intro Screen script to download in parallel while CSS blocks paint -->
  <link rel="preload" as="script" href="/intro.js" />

  <!-- Intro screen styles — loaded before any JS so overlay paints instantly -->
  <link rel="stylesheet" href="/intro.css">
</head>

<body class="ns-loading" style="background: #050b14;">

  <!-- Intro overlay — rendered at byte 0, before the React bundle loads -->
  <div id="ns-intro" role="dialog" aria-label="NinuSoft loading" aria-live="polite" style="display: none;">
    <div class="ns-glow ns-glow-1"></div>
    <div class="ns-glow ns-glow-2"></div>

    <div class="ns-stage">
      <!-- Logo + scan -->
      <div class="ns-logo-wrap" id="ns-logo-wrap">
        <div class="ns-bracket ns-tl"></div>
        <div class="ns-bracket ns-tr"></div>
        <div class="ns-bracket ns-bl"></div>
        <div class="ns-bracket ns-br"></div>
        <div id="ns-scan-glow"></div>
        <div id="ns-scan"></div>
        <img src="/logo.png" alt="NinuSoft logo" class="ns-logo" id="ns-logo" />
      </div>

      <!-- Brand name -->
      <div class="ns-brand">
        <h1>Ninu<span>Soft</span></h1>
        <p>Software Solutions from Nineveh</p>
      </div>

      <!-- Status -->
      <div id="ns-status">
        <span class="ns-dot ns-dot-idle" id="ns-dot"></span>
        <span id="ns-status-text">Initializing&hellip;</span>
      </div>

      <!-- Progress bar -->
      <div class="ns-bar-track">
        <div id="ns-bar-fill"></div>
      </div>
    </div>
  </div>

  <!-- React app root -->
  <div id="root"></div>

  <!-- React bundle (Vite module) -->
  <script type="module" src="/src/main.tsx"></script>

  <!-- Intro controller — runs synchronously after overlay HTML is parsed -->
  <script src="/intro.js"></script>

</body>

</html>
